<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="20" fill="url(#grad1)"/>
  
  <!-- Video camera icon -->
  <g transform="translate(20, 25)">
    <!-- Camera body -->
    <rect x="0" y="10" width="40" height="30" rx="4" fill="white"/>
    
    <!-- Lens -->
    <circle cx="20" cy="25" r="8" fill="#6366f1"/>
    <circle cx="20" cy="25" r="4" fill="white"/>
    
    <!-- Viewfinder -->
    <rect x="5" y="15" width="8" height="6" rx="1" fill="#8b5cf6" opacity="0.5"/>
    
    <!-- Triangle play button (right side) -->
    <path d="M 45 20 L 55 25 L 45 30 Z" fill="white"/>
    
    <!-- Flow arrows -->
    <path d="M 48 25 L 58 25" stroke="white" stroke-width="2" fill="none"/>
    <path d="M 55 22 L 58 25 L 55 28" fill="white"/>
  </g>
</svg>
